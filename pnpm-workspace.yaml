packages:
  - '.papi/descriptors'

# Force a single version of @polkadot-api/json-rpc-provider. The legacy @polkadot/api
# stack (via @substrate/connect) pulls older 0.0.x copies which otherwise get hoisted
# ahead of the v2 0.2.0 that polkadot-api v2 requires.
overrides:
  '@polkadot-api/json-rpc-provider': 0.2.0

# @polkadot-api/json-rpc-provider-proxy@0.4.0 imports @polkadot-api/json-rpc-provider
# at runtime but only declares it as a devDependency, so co-locate it explicitly.
packageExtensions:
  '@polkadot-api/json-rpc-provider-proxy':
    dependencies:
      '@polkadot-api/json-rpc-provider': 0.2.0
